name: "AX 교육과정 선발 평가"
description: "AI 전환(AX) 교육과정 참가자 선발을 위한 지원서 평가 루브릭"
total_score: 50

sections:
  - name: "서면 내용 평가"
    scoring_type: "standard"
    total_subscore: 40
    items:
      - name: "지원동기"
        max_score: 10
        weight: 1.0
        scoring_anchors:
          "9-10": "기관 맥락 + 개인 역량 갭 분석 + 교육 후 전파 계획이 실행 수준(대상, 방법, 일정)으로 구체적"
          "7-8": "기관 맥락 연결 명확 + 전파 계획 존재하나 구체성 미흡"
          "5-6": "개인적 동기 위주, 기관 맥락 연결 약함"
          "3-4": "일반적 AI 학습 희망 서술"
          "1-2": "동기 불명확 또는 관련성 낮은 내용"
        evidence_guide: "기관명, 부서 현안, 교육 후 활용 계획 등을 확인"
        academic_basis: "Noe & Wilk (1993) - 교육 참여 동기가 학습 전이(transfer of training)에 직접적 영향"

      - name: "AI·데이터 활용 경력"
        max_score: 20
        weight: 1.0
        scoring_anchors:
          "17-20": "3건 이상 프로젝트, 정량 성과 명시, 다양한 기술스택"
          "13-16": "2건 프로젝트 + 정량 성과 또는 1건 대규모 프로젝트"
          "9-12": "1건 프로젝트 경험, 성과 서술 있으나 정량화 부족"
          "5-8": "교육/자격증 수준의 경험"
          "1-4": "관련 경험 거의 없음"
        evidence_guide: "프로젝트명, 역할, 기술스택, 성과지표(정량) 확인"
        academic_basis: "Kolb (1984) - 경험학습이론, 구체적 경험이 학습 효과를 결정"

      - name: "현안 연결성"
        max_score: 5
        weight: 1.0
        scoring_anchors:
          "4-5": "기관 현안과 AI 기술 적용 방안이 구체적으로 연결"
          "2-3": "현안 언급은 있으나 AI 적용 방안이 추상적"
          "1": "현안 언급 없거나 연결 논리 부재"
        evidence_guide: "기관의 구체적 문제/과제와 AI 솔루션 연결 논리"
        academic_basis: "Broad & Newstrom (1992) - 교육 전이 환경 요인"

      - name: "데이터 확보·활용 가능성"
        max_score: 5
        weight: 1.0
        scoring_anchors:
          "4-5": "활용 가능 데이터 구체 명시 + 수집/전처리 계획"
          "2-3": "데이터 존재 언급하나 활용 계획 불명확"
          "1": "데이터 관련 언급 없음"
        evidence_guide: "데이터 종류, 규모, 접근 가능성, 활용 계획"
        academic_basis: "Provost & Fawcett (2013) - 데이터 사이언스 역량의 핵심은 데이터 접근성"

  - name: "과제 기획 평가"
    scoring_type: "standard"
    total_subscore: 10
    items:
      - name: "기술 타당성"
        max_score: 3
        weight: 1.0
        scoring_anchors:
          "3": "기술 선택 근거 + 대안 비교 + 구현 가능성 높음"
          "2": "기술 선택은 적절하나 근거 불충분"
          "1": "기술 선택 부적절 또는 언급 없음"
        evidence_guide: "제안 기술의 적합성, 대안 검토 여부"
        academic_basis: "Rogers (2003) - 기술 혁신 채택 요인 (상대적 이점, 적합성, 복잡성)"

      - name: "이행계획 구체성"
        max_score: 4
        weight: 1.0
        scoring_anchors:
          "4": "월별/단계별 일정 + 마일스톤 + 리스크 대응 포함"
          "3": "단계별 일정 존재하나 마일스톤/리스크 미흡"
          "2": "대략적 순서만 나열"
          "1": "이행계획 없거나 비현실적"
        evidence_guide: "일정표, 단계별 산출물, 리스크 관리 계획"
        academic_basis: "PMI PMBOK (2021) - 프로젝트 일정 관리 표준"

      - name: "기대효과"
        max_score: 3
        weight: 1.0
        scoring_anchors:
          "3": "정량 KPI 제시 + 측정 방법 명시"
          "2": "기대효과 서술 있으나 정량화 부족"
          "1": "기대효과 불명확"
        evidence_guide: "정량적 성과 지표, 측정 방법, 현실성"
        academic_basis: "Kirkpatrick (1994) - 교육 효과 4단계 평가 모델"

  - name: "가점"
    scoring_type: "checklist"
    total_subscore: 5
    items:
      - name: "가점 항목"
        max_score: 5
        weight: 1.0
        scoring_anchors:
          "0-5": "조건별 가점 합산"
        bonus_rules:
          - condition: "AI/데이터 관련 자격증 보유"
            bonus: 1.5
          - condition: "관련 논문/특허 보유"
            bonus: 2.0
          - condition: "오픈소스 기여 또는 대회 수상"
            bonus: 1.5
