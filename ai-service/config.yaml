# Claude API 설정
api:
  model: "claude-sonnet-4-20250514"
  max_tokens: 8192
  temperature: 0.2
  consistency_temperature: 0.7
  retry_attempts: 3
  retry_delay_seconds: 2
  retry_backoff_multiplier: 2
  rate_limit_max_retries: 5
  max_concurrency: 5
  timeout: 120

# 평가 설정
evaluation:
  default_rubric: null
  blind_mode: true
  max_text_length: 50000
  min_text_length: 50
  consistency_default_runs: 3
  consistency_threshold: 1.5
  max_batch_size: 100
  auto_select_fallback: "essay.yaml"

# 텍스트 초과 처리
text_overflow:
  strategy: "section_split"
  section_delimiters:
    - "\\n#{1,3}\\s"
    - "\\n\\d+\\.\\s"
    - "\\n\\n"

# 블라인드 모드 PII 패턴
blind:
  scope: "header"
  header_lines: 10
  mask_patterns:
    - type: "name_labeled"
      pattern: "(이름|성명|지원자)\\s*[:：]\\s*(.+)"
    - type: "name_inline"
      pattern: "(저는|본인은|제 이름은)\\s+([가-힣]{2,4})(입니다|이라고|이며)"
    - type: "age"
      pattern: "(\\d{2,4}년생|만\\s*\\d{1,2}세)"
    - type: "gender"
      pattern: "(남성|여성|남자|여자)"
    - type: "university_full"
      pattern: "([가-힣]+대학교|[가-힣]+대학|[A-Z][a-z]+ University)"
    - type: "university_abbr"
      pattern: "(서울대|연세대|고려대|성균관대|한양대|중앙대|경희대|이화여대|숙명여대|카이스트|포스텍|KAIST|POSTECH)[^가-힣]"
    - type: "phone"
      pattern: "(01[0-9]-?\\d{3,4}-?\\d{4})"
    - type: "email"
      pattern: "([\\w.-]+@[\\w.-]+\\.\\w+)"

# 출력 설정
output:
  dir: "output"
  filename_format: "{prefix}_{name}_{date}_{time}"
  include_charts: true
  chart_dpi: 150
  chart_style: "seaborn-v0_8-whitegrid"
  chart_font_family: null

# 로그 설정
logging:
  dir: "logs"
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  retention_days: 30
  max_bytes: 10485760

# DB 설정
database:
  path: "output/evaluation_history.db"

# 캘리브레이션
calibration:
  profile_path: "calibration_profile.json"
  min_examples: 3
  name_match_threshold: 0.6
